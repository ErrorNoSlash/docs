backend:
  name: github
  repo: ErrorNoSlash/docs
  branch: main

media_folder: docs/assets
public_folder: /assets

collections:
  - name: pages
    label: Documentation pages
    folder: docs
    extension: md
    create: true
    fields:
      - { name: title, label: Title, widget: string, required: false }
      - { name: body, label: Body, widget: markdown }