[project]

# name shown in the page header and browser window title
site_name = "Documentation"

# description included in the HTML head
site_description = "This is my docs site new projects documentaton will be available here."

# author attribute, used in the HTML head
site_author = "Dias Stas"

# canonical URL of the site - https://zensical.org/docs/setup/basics/#site_url
site_url = "https://docs.errornoslash.be/"

# copyright notice shown in the page footer
copyright = """
Copyright &copy; 2026 Dias Stas
"""

# site navigation
nav = [
  { "Welcome" = "index.md" },
  { "SlashyOS" = "slashyos.md" },
]

# sets extra css for customization
extra_css = ["stylesheets/extra.css"]

# sets extra js for customization
extra_javascript = ["javascripts/extra.js"]

# ----------------------------------------------------------------------------
# Theme options
# ----------------------------------------------------------------------------
[project.theme]

# change to "classic" for the traditional Material for MkDocs look
#variant = "classic"

# directory for template overrides - https://zensical.org/docs/customization/#extending-the-theme
#custom_dir = "overrides"

# site favicon
favicon = "assets/favicon.png"

# site language
language = "en"

# feature toggles - https://zensical.org/docs/setup/
features = [
    # let users dismiss the announcement bar
    "announce.dismiss",

    # edit button per page (needs a repository configured)
    #"content.action.edit",

    # view-markdown button per page (needs a repository configured)
    #"content.action.view",

    # icon-with-tooltip annotations in code blocks
    "content.code.annotate",

    # copy-to-clipboard button on code blocks
    "content.code.copy",

    # line-range selection button on code blocks
    "content.code.select",

    # render footnotes as inline tooltips
    "content.footnote.tooltips",

    # content tabs with the same titles switch together
    "content.tabs.link",

    # tooltips on links when hovering
    "content.tooltips",

    # hide parts of the header when scrolling down
    # "header.autohide",

    # expand all collapsible sidebar sections by default
    # "navigation.expand",

    # next/previous page links in the footer
    "navigation.footer",

    # attach index pages directly to sections
    "navigation.indexes",

    # load internal links via XHR instead of full page reloads
    "navigation.instant",

    # prefetch pages on link hover
    "navigation.instant.prefetch",

    # progress indicator for slow connections
    #"navigation.instant.progress",

    # breadcrumb navigation above the page title
    "navigation.path",

    # only include visible nav items in the HTML (smaller builds)
    #"navigation.prune",

    # render top-level sections as sidebar groups (desktop only)
    "navigation.sections",

    # render top-level sections as tabs below the header (desktop only)
    #"navigation.tabs",

    # keep navigation tabs visible when scrolling
    #"navigation.tabs.sticky",

    # back-to-top button when scrolling up
    "navigation.top",

    # update the URL with the active anchor while scrolling
    "navigation.tracking",

    # highlight search terms after following a search result
    "search.highlight",

    # auto-scroll the ToC so the active anchor stays visible
    # "toc.follow",

    # render the ToC inside the left navigation sidebar
    #"toc.integrate",
]

# sets site logo
logo = "assets/homelab-logo.png"

#[project.theme.icon]
#logo = "lucide/smile"

# fonts used by site
[project.theme.font]
text = "Outfit"
code = "JetBrains Mono"

# sets colors - https://zensical.org/docs/setup/colors/
[[project.theme.palette]]
scheme = "slate"
primary = "black"

# miscellaneous settings
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ErrorNoSlash"

[[project.extra.social]]
icon = "fontawesome/brands/gitlab"
link = "https://gitlab.com/ErrorN0Slash"

[[project.extra.social]]
icon = "material/email"
link = "mailto:dias.stas@pm.me"

# markdown extensions are set here
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
